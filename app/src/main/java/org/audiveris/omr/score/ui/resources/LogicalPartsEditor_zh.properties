# This is the Chinese (zh) version

add.Action.text = 新增
add.Action.shortDescription = 新增一个逻辑声部

duplicate.Action.text = 复制
duplicate.Action.shortDescription = 复制选中的逻辑声部

lock.Action.text = 锁定
lock.Action.shortDescription = 锁定/解锁逻辑声部

moveDown.Action.text = 下移
moveDown.Action.shortDescription = 将选中声部下移

moveUp.Action.text = 上移
moveUp.Action.shortDescription = 将选中声部上移

remove.Action.text = 删除
remove.Action.shortDescription = 删除选中的逻辑声部

save.Action.text = 保存
save.Action.shortDescription = 将逻辑声部保存到乐谱中

# Messages

dialog.title    = 逻辑声部编辑器 - 乐谱#{0} / {1}

headerStaves.text           =   谱表
headerStaves.toolTipText    =   <html>\
                                声部中各谱表的配置（逗号分隔）：\
                                <br>- 谱线数\
                                <br>- 's' 表示小谱表\
                                <br>\
                                （例如 5s,5 表示一个5线小谱表，\
                                后接一个标准5线谱表）\
                                </html>

headerName.text             = 名称
headerName.toolTipText      = 完整声部名称

headerAbbrev.text           = 缩写
headerAbbrev.toolTipText    = 缩写名称（如有）

headerTranspose.text           = 升降调
headerTranspose.toolTipText    = <html>\
                                乐器移调（半音数）：\
                                <br>正数 = 记谱音低于实际音（实际音更高），\
                                <br>负数 = 记谱音高于实际音（实际音更低），\
                                <br>0 或空白 = 不移调乐器\
                                <br>示例：降B小号 = -2，F圆号 = -7，降E中音萨克斯 = +3\
                                </html>

headerMidi.text             = MIDI
headerMidi.toolTipText      = 分配的 MIDI 音色号（如有）

locked          = 已锁定
unlocked        = 未锁定
canClose.title=未保存的修改
canClose.prompt=保存已编辑的逻辑声部？
