# Switches (alphabetical order preferably)

# Scaling processing switches

Switch.oneLineStaves.text               = 1线打击乐谱表
Switch.oneLineStaves.toolTipText        = <html>无音高的打击乐记谱， \
                                            出现在单线谱上。</html>

Switch.fourStringTablatures.text        = 4弦低音吉他指法谱
Switch.fourStringTablatures.toolTipText = <html><b>注</b>：这类指法谱将被检测， \
                                            但其内容将被<b>忽略</b>。</html>

Switch.fiveLineStaves.text              = 5线标准谱表
Switch.fiveLineStaves.toolTipText       = <html>标准记谱，位于五线谱上。</html>

Switch.drumNotation.text                = 5线打击乐谱表
Switch.drumNotation.toolTipText         = <html>无音高的打击乐记谱， \
                                            出现在五线谱上。</html>

Switch.sixStringTablatures.text         = 6弦吉他指法谱
Switch.sixStringTablatures.toolTipText  = <html><b>注</b>：这类指法谱将被检测， \
                                            但其内容将被<b>忽略</b>。</html>

# Other processing switches (in enum order preferably)

Switch.articulations.text           = 法音符号
Switch.articulations.toolTipText    = <html>重音、保持音、断音、较短断音、 \
                                            强重音。</html>

Switch.bothSharedHeadDots.text      = 将增时线连接到两个共享音头
Switch.bothSharedHeadDots.toolTipText   = <html>对于共享音头，将增时点连接到<b>两个</b>音头，\
                                            <br>而非仅连接到时值更长的和弦。\
                                            <br>\
                                            <br><b>注</b>：这仅适用于位于谱线或加线 \
                                            <b>之间</b>的音头。</html>

Switch.chordNames.text              = 和弦名称
Switch.chordNames.toolTipText       = <html>例如. F&#x266F;m7, Em&#x266D;5, D7&#x266F;5, \
                                       Am7&#x266D;5, A(9), BMaj7/D&#x266F;</html>

Switch.crossHeads.text              = 叉形音头
Switch.crossHeads.toolTipText       = <html><b>幽灵</b>音，无可辨音高， \
                                      用 '<b>X</b>' 表示。</html>

Switch.fingerings.text              = 指法
Switch.fingerings.toolTipText       = <html>手指数字：0, 1, 2, 3, 4, 5。</html>

Switch.frets.text                   = 品级（罗马数字 I, II, IV...）
Switch.frets.toolTipText            = <html>尚未实现</html>

Switch.implicitTuplets.text         = 隐式连音
Switch.implicitTuplets.toolTipText  = <html>必要时，可通过自动插入虚拟连音来纠正小节节奏。</html>

Switch.indentations.text            = 利用系统缩进
Switch.indentations.toolTipText     = <html>依据系统的相对缩进来检测新移动段的开始。</html>

Switch.keepGrayImages.text          = 保留灰度图像
Switch.keepGrayImages.toolTipText   = <html>在 .omr 项目文件中保留灰度图像。<br>\
                                      （注意：图像的<b>二值</b>版本始终保留）</html>

Switch.lyrics.text                  = 歌词
Switch.lyrics.toolTipText           = <html>谱表下方的文字行将被视为歌词行。</html>

Switch.lyricsAboveStaff.text        = 歌词（包括谱表上方）
Switch.lyricsAboveStaff.toolTipText = <html>位于谱表<b>上方</b>以及下方的文字行，\
                                      将被视为歌词行。</html>

Switch.multiWholeHeadChords.text    = 多个全音的和弦
Switch.multiWholeHeadChords.toolTipText = <html>包含多个全音符的和弦。</html>

Switch.partialWholeRests.text       = 比小节短的全休止符
Switch.partialWholeRests.toolTipText= <html>全休止符可能比小节更短。<br> \
                                      （仅适用于<b>全休止</b>形状，不包括双全休止或长休止）</html>

Switch.pluckings.text               = 拨弦指法（p, i, m, a）
Switch.pluckings.toolTipText        = <html>吉他右手：<br> \
                                      ('p' 为大拇指，'i' 为食指，'m' 为中指， \
                                      'a' 为无名指）</html>

Switch.smallHeads.text              = 小音头
Switch.smallHeads.toolTipText       = <html><b>Cue</b>版本的椭圆音头。</html>

Switch.smallBeams.text              = 小联音线
Switch.smallBeams.toolTipText       = <html><b>Cue</b>版本的联音线。</html>

Switch.tremolos.text                = 鞣音
Switch.tremolos.toolTipText         = <html>含 1 到 3 条斜线的鞣音。</html>
